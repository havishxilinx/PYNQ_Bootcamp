<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GridMind Arena</title>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; }
  .strip { background: #161b22; padding: 16px 24px; flex: 1; }
  .team-row { display: flex; justify-content: space-between; align-items: center; font-size: 22px; margin-bottom: 4px; font-weight: 500; }
  .score { font-size: 26px; font-weight: 800; color: #ED1C24; }
  .active { color: #fff; text-shadow: 0 0 10px rgba(237,28,36,0.65); }
  .active .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ED1C24; margin-right: 8px; box-shadow: 0 0 6px #ED1C24; }
  .streak { color: #f0883e; font-size: 14px; margin-left: 8px; }
  .timer-bar { height: 8px; background: #21262d; border-radius: 3px; overflow: hidden; margin: 6px 0; }
  .timer-fill { height: 100%; transition: width 0.5s linear, background-color 0.5s; }
  .tier-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
  .tier-bonus { font-weight: 800; font-size: 15px; }
  .puzzle-banner { background: #21262d; border-left: 3px solid #ED1C24; padding: 6px 10px; font-size: 13px; margin-bottom: 10px; border-radius: 4px; }
  .riddle-text { font-size: 20px; font-weight: 600; text-align: center; padding: 10px 0 16px; }
  .flip-banner { background: #3a2e00; border: 2px solid #ffcc00; color: #ffdd55; padding: 10px 14px; font-size: 20px; font-weight: 800; text-align: center; letter-spacing: 0.5px; margin-bottom: 10px; border-radius: 6px; }
  .idle { text-align: center; opacity: 0.6; padding: 40px; font-size: 20px; }
  .video-zone { display: none; margin-top: 14px; border: 2px solid #ED1C24; border-radius: 8px; overflow: hidden; background: #000; }
  .video-zone img { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div id="root">connecting...</div>
<div id="video-zone" class="video-zone"><img id="video-stream" alt="Live simulation view"></div>

<script>
const root = document.getElementById('root');
const params = new URLSearchParams(location.search);
const arenaNum = parseInt(params.get('arena'), 10) || 1;

function esc(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Timing/scoring constants come from GET /api/config (backed by
// data/game_config.json) rather than being hardcoded here -- these
// defaults only cover the brief window before that fetch resolves, and
// are overwritten in place by applyConfig() once it does. This keeps the
// UI's countdown and tier display honest with whatever the referee is
// actually scoring with, even if the config file is tuned before an event.
let TURN_TIMEOUT_SECS = 120;
let PHYSICAL_FLIP_OFFSET_SECS = 20;
let PUZZLE_RACE_SECS = 120;
let FREE_HINT_SECS = 60;
let scoringTiers = [
  { max_elapsed_secs: 20, bonus: 2 },
  { max_elapsed_secs: 40, bonus: 1 },
  { max_elapsed_secs: 60, bonus: 0 },
  { max_elapsed_secs: 80, bonus: -1 },
  { max_elapsed_secs: 100, bonus: -2 },
  { max_elapsed_secs: 999999, bonus: -3 },
];

async function loadConfig() {
  try {
    const response = await fetch('/api/config');
    const cfg = await response.json();
    TURN_TIMEOUT_SECS = cfg.turn_timeout_secs;
    PHYSICAL_FLIP_OFFSET_SECS = cfg.physical_flip_offset_secs;
    PUZZLE_RACE_SECS = cfg.puzzle_race_secs;
    FREE_HINT_SECS = cfg.free_hint_secs;
    scoringTiers = cfg.scoring_tiers;
  } catch (err) {
    console.warn('config: failed to load /api/config, using built-in defaults', err);
  }
}

// Client-side turn countdown: updated on every WS message, ticked by setInterval.
let turnDeadlineMs = null;

// Client-side pregame countdown (puzzle race / free hint window) -- same
// local-tick approach as the turn timer, since the server only pushes on
// state changes, not every second.
let pregameDeadlineMs = null;
let pregameTotalSecs = null;

let activeView = null; // 'turn' | 'pregame' | null

function localSecsRemaining() {
  if (turnDeadlineMs === null) return 0;
  return Math.max(0, Math.round((turnDeadlineMs - Date.now()) / 1000));
}

// Colors ramp from green (best tier) to red (worst); label follows the
// bonus's sign rather than a fixed tier count, so this still reads
// sensibly if data/game_config.json is edited to add/remove tiers.
const TIER_COLORS = ['#22c55e', '#84cc16', '#eab308', '#f97316', '#ef4444', '#dc2626'];

function tierInfo(secs) {
  const elapsed = Math.max(0, TURN_TIMEOUT_SECS - secs - PHYSICAL_FLIP_OFFSET_SECS);
  const idx = scoringTiers.findIndex((tier) => elapsed <= tier.max_elapsed_secs);
  const tierIndex = idx === -1 ? scoringTiers.length - 1 : idx;
  const tier = scoringTiers[tierIndex] || { bonus: 0 };
  const color = TIER_COLORS[Math.min(tierIndex, TIER_COLORS.length - 1)];
  const bonusText = tier.bonus > 0 ? `+${tier.bonus}` : tier.bonus === 0 ? '0' : `−${Math.abs(tier.bonus)}`;
  let label;
  if (tier.bonus > 0) {
    label = tierIndex === 0 ? `Flip now! ${bonusText} bonus` : `Good — ${bonusText} bonus`;
  } else if (tier.bonus === 0) {
    label = 'Neutral — no bonus';
  } else {
    label = tierIndex === scoringTiers.length - 1
      ? `Timeout risk — ${bonusText} penalty`
      : `Slow — ${bonusText} penalty`;
  }
  return { bonus: bonusText, color, label };
}

function localPregameSecsRemaining() {
  if (pregameDeadlineMs === null) return 0;
  return Math.max(0, Math.round((pregameDeadlineMs - Date.now()) / 1000));
}

function updateTimerDom() {
  if (activeView === 'turn') {
    const secs = localSecsRemaining();
    const pct = Math.max(0, Math.min(100, (secs / TURN_TIMEOUT_SECS) * 100));
    const tier = tierInfo(secs);
    const bar = document.getElementById('timer-fill');
    const timerLabel = document.getElementById('timer-label');
    const tierLabel = document.getElementById('tier-label');
    const tierBonus = document.getElementById('tier-bonus');
    if (bar) { bar.style.width = pct + '%'; bar.style.backgroundColor = tier.color; }
    if (timerLabel) timerLabel.textContent = secs + 's remaining';
    if (tierLabel) { tierLabel.textContent = tier.label; tierLabel.style.color = tier.color; }
    if (tierBonus) { tierBonus.textContent = tier.bonus; tierBonus.style.color = tier.color; }
  } else if (activeView === 'pregame') {
    const secs = localPregameSecsRemaining();
    const total = pregameTotalSecs || 1;
    const pct = Math.max(0, Math.min(100, (secs / total) * 100));
    const bar = document.getElementById('pregame-timer-fill');
    const label = document.getElementById('pregame-timer-label');
    if (bar) bar.style.width = pct + '%';
    if (label) label.textContent = secs + 's remaining';
  }
}

setInterval(updateTimerDom, 500);

function renderStrip(arena) {
  // Sync the deadline on every state push from the server.
  turnDeadlineMs = Date.now() + arena.turn_seconds_remaining * 1000;
  activeView = 'turn';

  const teams = [arena.team_a, arena.team_b];
  const rows = teams.map((team) => {
    const isActive = team === arena.active_team;
    const streak = arena.streak[team] || 0;
    return `<div class="team-row ${isActive ? 'active' : ''}">
      <span>${isActive ? '<span class="dot"></span>' : ''}${esc(team)}${streak > 0 ? `<span class="streak">🔥x${streak}</span>` : ''}</span>
      <span class="score">${arena.scores[team] ?? 0}</span>
    </div>`;
  }).join('');
  const secs = localSecsRemaining();
  const pct = Math.max(0, Math.min(100, (secs / TURN_TIMEOUT_SECS) * 100));
  const tier = tierInfo(secs);
  const puzzleBanner = arena.puzzle_winner
    ? `<div class="puzzle-banner">🧩 ${esc(arena.puzzle_winner)} solved the whole-board puzzle first — chose to go first</div>`
    : '';
  const flipBanner = Array.isArray(arena.flip_pending_positions)
    ? `<div class="flip-banner">🃏 FLIP CARDS AT ${esc(arena.flip_pending_positions[0])} AND ${esc(arena.flip_pending_positions[1])} NOW</div>`
    : '';
  return `${flipBanner}${puzzleBanner}${rows}
    <div class="timer-bar"><div id="timer-fill" class="timer-fill" style="width:${pct}%;background-color:${tier.color}"></div></div>
    <div class="tier-row">
      <span id="timer-label" style="opacity:0.7">${secs}s remaining</span>
      <span id="tier-label" style="color:${tier.color}">${tier.label}</span>
      <span id="tier-bonus" class="tier-bonus" style="color:${tier.color}">${tier.bonus}</span>
    </div>
    <div>${arena.pairs_found}/${arena.total_pairs} pairs found</div>`;
}

function renderPregameStrip(pregame) {
  if (pregame.stage === 'waiting_for_teams') {
    // No deadline yet -- nothing timed has started. Registration (and the
    // whole tournament schedule) can exist long before either team is
    // actually present for this specific match.
    activeView = null;
    const aMark = pregame.team_a_joined ? '✅' : '⏳';
    const bMark = pregame.team_b_joined ? '✅' : '⏳';
    return `<div class="puzzle-banner">⏳ Waiting for both teams to connect</div>
      <div class="team-row"><span>${aMark} ${esc(pregame.team_a)}</span><span>vs</span><span>${bMark} ${esc(pregame.team_b)}</span></div>`;
  }

  if (pregame.stage === 'ready_to_start') {
    // Both teams joined, but the riddle is held back until the operator
    // explicitly starts it -- no deadline exists yet, so nothing to time.
    activeView = null;
    return `<div class="puzzle-banner">✅ Both teams joined -- waiting for operator to start</div>
      <div class="team-row"><span>${esc(pregame.team_a)}</span><span>vs</span><span>${esc(pregame.team_b)}</span></div>`;
  }

  const isPuzzleRace = pregame.stage === 'puzzle_race';
  activeView = 'pregame';
  pregameDeadlineMs = pregame.deadline_unix_ms;
  pregameTotalSecs = isPuzzleRace ? PUZZLE_RACE_SECS : FREE_HINT_SECS;

  const banner = isPuzzleRace ? '🧩 Puzzle Race in progress' : '🔍 Free Hint window';
  const riddle = isPuzzleRace
    ? `<div class="riddle-text">${esc(pregame.riddle)}</div>`
    : '';
  const secs = localPregameSecsRemaining();
  const pct = Math.max(0, Math.min(100, (secs / pregameTotalSecs) * 100));
  return `<div class="puzzle-banner">${banner}</div>
    ${riddle}
    <div class="team-row"><span>${esc(pregame.team_a)}</span><span>vs</span><span>${esc(pregame.team_b)}</span></div>
    <div class="timer-bar"><div id="pregame-timer-fill" class="timer-fill" style="width:${pct}%;background-color:#58a6ff"></div></div>
    <div id="pregame-timer-label" style="opacity:0.7;font-size:13px">${secs}s remaining</div>`;
}

// The video element lives outside #root (never touched by root.innerHTML
// replacement below) specifically so re-renders on every score update
// don't tear down and restart the MJPEG connection -- only assign `img.src`
// when the URL actually changes. `onerror` hides the whole zone so an
// unreachable/unpatched Genesis server (see `GenesisClient::competition_stream_url`)
// degrades to simply not showing video, not a broken-image icon.
const videoZone = document.getElementById('video-zone');
const videoImg = document.getElementById('video-stream');
videoImg.onerror = () => { videoZone.style.display = 'none'; };

function updateVideoZone(streamUrl) {
  if (!streamUrl) {
    videoZone.style.display = 'none';
    videoImg.removeAttribute('src');
    return;
  }
  if (videoImg.getAttribute('src') !== streamUrl) {
    videoImg.src = streamUrl;
  }
  videoZone.style.display = 'block';
}

function render(state) {
  let arena = null;
  let pregame = null;
  let idleMessage = null;

  if (state.phase === 'live_pool_play') {
    const key = arenaNum === 1 ? 'arena1' : 'arena2';
    const pregameKey = arenaNum === 1 ? 'arena1_pregame' : 'arena2_pregame';
    pregame = state[pregameKey] || null;
    arena = state[key] || null;
    if (!pregame && !arena) idleMessage = `Arena ${arenaNum} idle`;
  } else if (state.phase === 'grand_final') {
    if (state.arena_num === arenaNum) {
      arena = state.arena;
    } else {
      idleMessage = `Grand Final is running on Arena ${state.arena_num}, not this one`;
    }
  } else {
    idleMessage = `Tournament phase: ${esc(state.phase)}`;
  }

  updateVideoZone(arena ? arena.genesis_stream_url : null);

  if (pregame) {
    root.innerHTML = `<div class="strip">${renderPregameStrip(pregame)}</div>`;
    return;
  }
  if (arena) {
    root.innerHTML = `<div class="strip">${renderStrip(arena)}</div>`;
    return;
  }
  activeView = null;
  root.innerHTML = `<div class="idle">${esc(idleMessage)}</div>`;
}

let retryDelaySeconds = 1;

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (event) => {
    retryDelaySeconds = 1;
    render(JSON.parse(event.data));
  };
  ws.onclose = () => {
    root.innerHTML = `<div class="idle">Disconnected from Master -- reconnecting in ${retryDelaySeconds}s...</div>`;
    setTimeout(connect, retryDelaySeconds * 1000);
    retryDelaySeconds = Math.min(retryDelaySeconds * 2, 30);
  };
}

loadConfig().finally(connect);
</script>
</body>
</html>
